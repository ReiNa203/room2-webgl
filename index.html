<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Unity WebGL Player | room2</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      display: flex;
      justify-content: center;
    }

    #page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 0;
    }

    #unity-container {
      position: relative;
      width: min(860px, 82vw);
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
    }

    #unity-warning {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      z-index: 30;
    }

    /* 🎬 結局影片 */
    #ending-video-overlay {
      position: absolute;
      left: 16%;
      top: 23%;
      width: 28%;
      height: 33%;
      z-index: 28;
      overflow: hidden;
      display: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #ending-video-overlay.visible {
      display: block;
      opacity: 1;
    }

    #ending-video-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150%;
      height: 100%;
      transform: translate(-50%, -50%);
      border: 0;
    }

    @media (max-width: 768px) {
      #unity-container {
        width: 78vw;
        max-width: 560px;
      }

      #ending-video-overlay {
        left: 12%;
        top: 32%;
        width: 76%;
        height: 22%;
      }
    }
  </style>
</head>

<body>
  <div id="page">
    <div id="unity-container">
      <canvas id="unity-canvas" width="1920" height="1080"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>

      <!-- 🎬 結局影片 -->
      <div id="ending-video-overlay">
        <iframe id="ending-video-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");

    const endingVideoOverlay = document.getElementById("ending-video-overlay");
    const endingVideoFrame = document.getElementById("ending-video-frame");

    const GOOD_VIDEO_ID = "ibzq-5RsHVk";
    const BAD_VIDEO_ID = "haLkxcfWCwg";

    function unityShowBanner(msg) {
      const div = document.createElement("div");
      div.innerHTML = msg;
      div.style = "background:red; padding:10px;";
      warningBanner.appendChild(div);
    }

    // 🎬 結局影片控制
    function setEndingVideo(videoId) {
      endingVideoFrame.src =
        "https://www.youtube.com/embed/" +
        videoId +
        "?autoplay=1&mute=1&playsinline=1";
    }

    function showEndingVideo() {
      endingVideoOverlay.style.display = "block";
      requestAnimationFrame(() => {
        endingVideoOverlay.classList.add("visible");
      });
    }

    function hideEndingVideo() {
      endingVideoOverlay.classList.remove("visible");
      setTimeout(() => {
        endingVideoOverlay.style.display = "none";
        endingVideoFrame.src = "";
      }, 800);
    }

    window.showGoodEndingVideo = function () {
      setEndingVideo(GOOD_VIDEO_ID);
      showEndingVideo();
    };

    window.showBadEndingVideo = function () {
      setEndingVideo(BAD_VIDEO_ID);
      showEndingVideo();
    };

    window.hideEndingVideo = hideEndingVideo;

    // 🔥 Unity 設定（已對齊檔名）
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/ROOM2 BUILD github.loader.js";

    const config = {
      dataUrl: buildUrl + "/ROOM2 BUILD github.data.unityweb",
      frameworkUrl: buildUrl + "/ROOM2 BUILD github.framework.js.unityweb",
      codeUrl: buildUrl + "/ROOM2 BUILD github.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "room2",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,
    };

    loadingBar.style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then(() => {
        loadingBar.style.display = "none";
        hideEndingVideo();
      }).catch((message) => {
        alert(message);
      });
    };

    script.onerror = () => {
      alert("❌ loader 載入失敗，請確認 Build 檔案名稱完全一致");
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
