<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Unity WebGL Player | room2</title>
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">

<style>
html, body { 
  margin: 0; 
  padding: 0; 
  width: 100%; 
  height: 100%; 
  background-color: #000; 
  overflow: hidden; 
}

#unity-container {
  position: absolute;
  width: 100vw;
  height: 100vh;
}

#unity-canvas {
  width: 100% !important;
  height: 100% !important;
  position: absolute;
  z-index: 10;
}

/* 🎬 結局影片位置 */
#ending-video-overlay {
  position: absolute;
  left: 16%;
  top: 23%;
  width: 28%;
  height: 33%;
  z-index: 28;
  overflow: hidden;
  display: none;
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: auto;
}

#ending-video-overlay.visible {
  display: block;
  opacity: 1;
}

#ending-video-frame {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 150%;
  height: 100%;
  transform: translate(-50%, -50%);
  border: 0;
}

#unity-loading-bar { z-index: 30; }
#unity-footer { display: none; }
</style>
</head>

<body>
<div id="unity-container">
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-warning"></div>

  <!-- 🎬 結局影片 -->
  <div id="ending-video-overlay">
    <iframe
      id="ending-video-frame"
      src=""
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

<script>
var canvas = document.querySelector("#unity-canvas");
var loadingBar = document.querySelector("#unity-loading-bar");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var warningBanner = document.querySelector("#unity-warning");

const endingVideoOverlay = document.getElementById("ending-video-overlay");
const endingVideoFrame = document.getElementById("ending-video-frame");

/* ===== 兩支影片 ID ===== */
const GOOD_VIDEO_ID = "ibzq-5RsHVk";
const BAD_VIDEO_ID  = "haLkxcfWCwg";

function unityShowBanner(msg, type) {
  var div = document.createElement("div");
  div.innerHTML = msg;
  warningBanner.appendChild(div);
}

/* 設定影片 */
function setEndingVideo(videoId) {
  endingVideoFrame.src =
    "https://www.youtube.com/embed/" +
    videoId +
    "?autoplay=1&mute=1&playsinline=1";
}

/* 淡入顯示 */
function showEndingVideo() {
  if (!endingVideoOverlay.classList.contains("visible")) {
    endingVideoOverlay.style.display = "block";
    requestAnimationFrame(() => {
      endingVideoOverlay.classList.add("visible");
    });
  }
}

/* 淡出隱藏 */
function hideEndingVideo() {
  endingVideoOverlay.classList.remove("visible");

  setTimeout(() => {
    endingVideoOverlay.style.display = "none";
    endingVideoFrame.src = "";
  }, 800);
}

/* 好結局 */
function showGoodEndingVideo() {
  setEndingVideo(GOOD_VIDEO_ID);
  showEndingVideo();
}

/* 壞結局 */
function showBadEndingVideo() {
  setEndingVideo(BAD_VIDEO_ID);
  showEndingVideo();
}

/* Unity Build */
var buildUrl = "Build";
var loaderUrl = buildUrl + "/ROOM2 BUILD.loader.js";

var config = {
  dataUrl: buildUrl + "/ROOM2 BUILD.data",
  frameworkUrl: buildUrl + "/ROOM2 BUILD.framework.js",
  codeUrl: buildUrl + "/ROOM2 BUILD.wasm",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "DefaultCompany",
  productName: "room2",
  productVersion: "0.1.0",
  showBanner: unityShowBanner,
};

loadingBar.style.display = "block";

var script = document.createElement("script");
script.src = loaderUrl;

script.onload = () => {
  createUnityInstance(canvas, config, (progress) => {
    progressBarFull.style.width = 100 * progress + "%";
  }).then(() => {
    loadingBar.style.display = "none";

    /* 正式版：一開始先隱藏影片 */
    hideEndingVideo();

  }).catch((message) => {
    alert(message);
  });
};

document.body.appendChild(script);
</script>
</body>
</html>
