<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Unity WebGL Player | room2</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
    }

    #unity-container {
      position: absolute;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      position: absolute;
      z-index: 10;
      touch-action: none;
      background: #000;
    }

    #unity-loading-bar {
      z-index: 30;
    }

    #unity-footer {
      display: none;
    }

    #unity-warning {
      position: absolute;
      z-index: 40;
    }

    /* µ˛§˝Ľv¤ů */
    #ending-video-overlay {
      position: absolute;
      left: 16%;
      top: 23%;
      width: 28%;
      height: 33%;
      z-index: 28;
      overflow: hidden;
      display: none;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: auto;
    }

    #ending-video-overlay.visible {
      display: block;
      opacity: 1;
    }

    #ending-video-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150%;
      height: 100%;
      transform: translate(-50%, -50%);
      border: 0;
    }

    @media (max-width: 768px) {
      #ending-video-overlay {
        left: 12%;
        top: 32%;
        width: 76%;
        height: 22%;
      }

      #ending-video-frame {
        width: 120%;
        height: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">room2</div>
    </div>

    <div id="ending-video-overlay">
      <iframe
        id="ending-video-frame"
        src=""
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const fullscreenButton = document.querySelector("#unity-fullscreen-button");
    const warningBanner = document.querySelector("#unity-warning");

    const endingVideoOverlay = document.getElementById("ending-video-overlay");
    const endingVideoFrame = document.getElementById("ending-video-frame");

    const GOOD_VIDEO_ID = "ibzq-5RsHVk";
    const BAD_VIDEO_ID = "haLkxcfWCwg";

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      const div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);

      if (type === "error") {
        div.style = "background: red; padding: 10px;";
      } else {
        if (type === "warning") div.style = "background: yellow; padding: 10px;";
        setTimeout(() => {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      updateBannerVisibility();
    }

    function setEndingVideo(videoId) {
      endingVideoFrame.src =
        "https://www.youtube.com/embed/" +
        videoId +
        "?autoplay=1&mute=1&playsinline=1";
    }

    function showEndingVideo() {
      endingVideoOverlay.style.display = "block";
      requestAnimationFrame(() => {
        endingVideoOverlay.classList.add("visible");
      });
    }

    function hideEndingVideo() {
      endingVideoOverlay.classList.remove("visible");
      setTimeout(() => {
        endingVideoOverlay.style.display = "none";
        endingVideoFrame.src = "";
      }, 800);
    }

    window.showGoodEndingVideo = function () {
      console.log("GOOD ending video");
      setEndingVideo(GOOD_VIDEO_ID);
      showEndingVideo();
    };

    window.showBadEndingVideo = function () {
      console.log("BAD ending video");
      setEndingVideo(BAD_VIDEO_ID);
      showEndingVideo();
    };

    window.hideEndingVideo = hideEndingVideo;

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/ROOM2 BUILD.loader.js";

    const config = {
      dataUrl: buildUrl + "/ROOM2 BUILD.data",
      frameworkUrl: buildUrl + "/ROOM2 BUILD.framework.js",
      codeUrl: buildUrl + "/ROOM2 BUILD.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "room2",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "1920px";
      canvas.style.height = "1080px";
    }

    loadingBar.style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
        hideEndingVideo();

        if (fullscreenButton) {
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }
      }).catch((message) => {
        alert(message);
      });
    };

    script.onerror = () => {
      alert("ROOM2 BUILD.loader.js ¸ü¤JĄ˘±ŃˇA˝ĐŔË¬d Build ¸ę®Ć§¨©MŔÉ¦WˇC");
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
